# Основной конфиг Nginx

# Секция events обязательна
events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

# Stream модуль для проксирования TCP (SSH)
stream {
    # Логи для stream
    log_format basic '$remote_addr [$time_local] '
                     '$protocol $status $bytes_sent $bytes_received '
                     '$session_time';
    
    access_log /var/log/nginx/stream-access.log basic buffer=32k;
    error_log /var/log/nginx/stream-error.log;
    
    # Upstream для SSH (172.17.0.1 - IP хоста Docker)
    upstream ssh_backend {
        server 172.17.0.1:22;
    }
    
    # Сервер для SSH через порт 443
    server {
        listen 443 ssl;
        proxy_pass ssh_backend;
        
        # SSL сертификаты (генерируются автоматически)
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        
        # SSL настройки
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # Таймауты
        proxy_connect_timeout 30s;
        proxy_timeout 24h;
    }
}

# HTTP модуль для веб-сайта
http {
    # Базовые настройки
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Логи
    access_log /var/log/nginx/http-access.log buffer=32k;
    error_log /var/log/nginx/http-error.log;
    
    # Основные настройки
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    
    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    
    # Основной сервер
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        
        # Корневая директория
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # Локации
        location / {
            try_files $uri $uri/ =404;
        }
        
        # Статика с длительным кэшированием
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Страницы ошибок
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
        
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }
    }
}