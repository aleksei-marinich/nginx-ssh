server {
    listen 80;
    server_name 194.58.95.200;
    
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name 194.58.95.200;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ВАЖНО: поддержка WebSocket
    location / {
        proxy_pass http://webssh:8888;  # Для варианта 1 (cleberjsantos)
        # proxy_pass http://webssh:2222;  # Для варианта 2 (oldiy/docker-webssh2)
        # proxy_pass http://webssh:8080;  # Для варианта 3 (achaiah/alpine-webssh)
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 3600s;
        proxy_connect_timeout 75s;
    }
}