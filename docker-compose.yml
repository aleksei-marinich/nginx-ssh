version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx-ssh-proxy
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/usr/share/nginx/html:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"