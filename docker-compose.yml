version: '3.8'

services:
  # WebSSH сервис на Python
  webssh:
    image: webssh/websockify:latest  # легковесный образ с webssh
    container_name: webssh
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow  # ваш часовой пояс
    command: wssh --address=0.0.0.0 --port=8888 --policy=reject
    networks:
      - webssh-network
    # healthcheck для мониторинга
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx как reverse proxy с SSL
  nginx:
    image: nginx:alpine
    container_name: webssh-nginx
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP для перенаправления на HTTPS
      - "443:443"  # HTTPS - основной вход
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # если будут свои сертификаты
    depends_on:
      - webssh
    networks:
      - webssh-network

networks:
  webssh-network:
    driver: bridge