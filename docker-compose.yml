version: '3.8'

services:
  # Nginx прокси
  nginx:
    build: ./nginx
    container_name: ${APP_NAME:-myapp}-nginx
    restart: unless-stopped
    network_mode: host  # Нужно для доступа к SSH хоста
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/usr/share/nginx/html:ro
    environment:
      - SERVER_IP=${SERVER_IP:-localhost}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

